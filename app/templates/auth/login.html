{% extends "base.html" %}
{% block title %}Login – EaselyWell{% endblock %}

{% block extra_styles %}
<style>
    .auth-page {
        min-height: calc(100vh - 65px);
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 2rem 1.5rem;
    }
    .auth-card {
        background: white;
        border-radius: 24px;
        padding: 2.5rem;
        width: 100%;
        max-width: 460px;
        box-shadow: 0 4px 24px rgba(0,0,0,0.07);
    }
    .auth-header {
        text-align: center;
        margin-bottom: 2rem;
    }
    .auth-header .icon { font-size: 2.5rem; margin-bottom: 0.75rem; }
    .auth-header h2 {
        font-size: 2rem;
        font-weight: 700;
        color: var(--text-dark);
        margin-bottom: 0.4rem;
    }
    .auth-header p { font-size: 0.95rem; color: var(--text-mid); }
    .btn-full { width: 100%; text-align: center; padding: 0.9rem; margin-top: 0.5rem; }
    .auth-footer {
        text-align: center;
        margin-top: 1.5rem;
        font-size: 0.9rem;
        color: var(--text-mid);
    }
    .auth-footer a {
        color: var(--green-dark);
        font-weight: 700;
        text-decoration: none;
    }
    .auth-footer a:hover { text-decoration: underline; }
    .divider { border: none; border-top: 1px solid var(--cream-dark); margin: 1.5rem 0; }
</style>
{% endblock %}

{% block content %}
<div class="auth-page">
    <div class="auth-card">
        <div class="auth-header">
            <div class="icon">👋</div>
            <h2>Welcome back</h2>
            <p>Sign in to continue your wellness journey</p>
        </div>

        <form method="POST" action="{{ url_for('auth.login') }}">
            <div class="form-group">
                <label>Email address</label>
                <input type="email" name="email" placeholder="you@example.com" required>
            </div>
            <div class="form-group">
                <label>Password</label>
                <input type="password" name="password" placeholder="Your password" required>
            </div>

            <button type="submit" class="btn-primary btn-full">Sign in</button>
        </form>

        <hr class="divider">

        <div class="auth-footer">
            Don't have an account? <a href="{{ url_for('auth.register') }}">Sign up free</a>
        </div>
    </div>
</div>
{% endblock %}
